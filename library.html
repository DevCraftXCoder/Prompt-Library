<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Library — Paste</title>
<meta name="description" content="Browse the Paste prompt library — production-ready prompts. Filter by category, tier, and service. Copy with one click."/>
<link rel="canonical" href="https://devcraftxcoder.github.io/Prompt-Library/library.html"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080809;color:#e8e8e8;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;height:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
select{font-family:inherit}

:root{
  --red:#e94560;
  --red-dim:rgba(233,69,96,0.15);
  --red-border:rgba(233,69,96,0.5);
  --bg:#080809;
  --bg-elev:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.07);
  --border-sub:rgba(255,255,255,0.06);
  --txt:#e8e8e8;
  --txt-dim:rgba(255,255,255,0.4);
  --txt-mute:rgba(255,255,255,0.25);
  --txt-ultra:rgba(255,255,255,0.2);
  --font-head:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}

/* ─── Layout ─────────────────────────────────────────────────────────────── */
#root{display:flex;align-items:stretch;min-height:100vh}

/* ─── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar{
  width:220px;flex-shrink:0;
  background:rgba(255,255,255,0.015);
  border-right:1px solid var(--border-sub);
  position:sticky;top:0;height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;
  padding:20px 0 24px;
}
.sidebar-cat-header{
  font-size:9px;font-weight:700;letter-spacing:1.2px;
  color:var(--txt-ultra);text-transform:uppercase;
  padding:0 16px 10px;
  font-family:var(--font-mono);
}
#sidebar-list{flex:1;display:flex;flex-direction:column;gap:1px}
.sidebar-btn{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;
  cursor:pointer;background:transparent;
  border:none;border-left:2px solid transparent;
  color:var(--txt-dim);
  font-size:12.5px;font-weight:400;text-align:left;width:100%;
  transition:background .12s,color .12s;
  font-family:var(--font-body);
}
.sidebar-btn:hover{background:rgba(255,255,255,0.03)}
.sidebar-btn.active{
  background:rgba(255,255,255,0.05);
  border-left-color:var(--red);
  color:var(--txt);font-weight:500;
  padding-left:14px;
}
.sidebar-icon-box{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  background:rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:background .12s,filter .12s;
}
.sidebar-btn.active .sidebar-icon-box{
  background:rgba(233,69,96,0.12);
  filter:drop-shadow(0 0 4px rgba(233,69,96,0.5));
}
.sidebar-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-count{
  font-size:10px;color:var(--txt-mute);
  font-family:var(--font-mono);font-weight:500;flex-shrink:0;
  background:rgba(255,255,255,0.06);border-radius:9px;padding:0 5px;
}
.sidebar-btn.active .sidebar-count{color:rgba(255,255,255,0.5)}

/* ─── Main ────────────────────────────────────────────────────────────────── */
#main{flex:1;min-width:0;display:flex;flex-direction:column}

/* ─── Dash Header ─────────────────────────────────────────────────────────── */
#dash-header{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border-sub);
}
.logo-wrap{display:flex;justify-content:center;margin-bottom:10px}
#paste-logo{
  width:119px;height:119px;
  animation:pasteLogoFloat 3s ease-in-out infinite;
}
@keyframes pasteLogoFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
.title-row{
  display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:12px;
}
.title-row h1{
  margin:0;font-size:22px;font-weight:700;color:var(--txt);
  font-family:var(--font-head);line-height:1.2;
}
#total-count{
  font-size:12px;color:var(--txt-mute);
  font-family:var(--font-mono);
}
.controls-row{
  display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:14px;
}
.model-toggle{display:flex;align-items:center;gap:2px}
.model-btn{
  padding:4px 10px;border-radius:5px;
  font-size:11px;font-weight:400;cursor:pointer;
  background:transparent;
  border:1px solid transparent;
  color:var(--txt-dim);
  transition:all .14s;font-family:var(--font-body);
}
.model-btn.active{
  background:rgba(255,255,255,0.07);
  border-color:rgba(255,255,255,0.12);
  color:var(--txt);font-weight:600;
}
#sort-select{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;
  color:rgba(255,255,255,0.6);
  font-size:12px;
  padding:6px 10px;cursor:pointer;outline:none;
}
#sort-select option{background:#111;color:#ddd}
#new-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:7px;
  font-size:12px;font-weight:600;cursor:pointer;
  background:var(--red);border:none;color:#fff;
  font-family:var(--font-body);white-space:nowrap;
}
.search-section{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.search-wrap{position:relative;width:100%;max-width:520px}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  pointer-events:none;opacity:.35;
}
#search{
  width:100%;padding:9px 36px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:8px;font-size:13px;color:#ddd;
  font-family:var(--font-body);outline:none;
  transition:border-color .15s;
}
#search:focus{border-color:var(--red-border)}
#search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  display:none;background:none;border:none;cursor:pointer;
  color:var(--txt-dim);align-items:center;
}
.service-filters{display:flex;align-items:center;gap:0}
.svc-btn{
  padding:5px 14px;border-radius:20px;
  font-size:12px;font-weight:400;cursor:pointer;
  background:transparent;
  border:1px solid transparent;
  color:var(--txt-dim);
  transition:all .14s;font-family:var(--font-body);
}
.svc-btn.active{
  background:rgba(233,69,96,0.15);
  border-color:var(--red-border);
  color:var(--red);font-weight:600;
}

/* ─── Content area ────────────────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;padding:20px 24px 40px}

/* Category header */
#cat-header{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
#cat-header .cat-icon{font-size:16px}
#cat-header .cat-label{
  font-size:14px;font-weight:600;color:#d0d0d0;
  font-family:var(--font-body);
}
#cat-header .cat-count{
  font-size:11px;color:var(--txt-mute);
  font-family:var(--font-mono);
}
#cat-header .spacer{flex:1}
#expand-all-btn{
  padding:4px 12px;border-radius:6px;
  font-size:11px;font-weight:500;cursor:pointer;
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  color:var(--txt-dim);
  font-family:var(--font-body);
  transition:all .14s;
}

/* Tier tabs */
.tier-tabs{
  display:flex;align-items:center;gap:6px;
  margin-bottom:16px;flex-wrap:wrap;
}
.tier-btn{
  padding:4px 12px;border-radius:6px;
  border:1px solid rgba(255,255,255,0.08);
  background:#1a1a1a;
  color:rgba(255,255,255,0.55);
  font-size:12px;font-weight:400;
  font-family:var(--font-body);cursor:pointer;
  transition:background .15s,color .15s;
}
.tier-btn.active{
  background:var(--red);border:none;
  color:#fff;font-weight:600;
}

/* Search results label */
#search-results-label{
  font-size:11px;color:var(--txt-mute);
  font-family:var(--font-mono);margin-bottom:16px;display:none;
}

/* ─── Card Grid ───────────────────────────────────────────────────────────── */
.prompt-card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,320px);
  justify-content:start;
  gap:20px;
}

/* ─── Prompt Card ─────────────────────────────────────────────────────────── */
.prompt-card{
  background:var(--bg-elev);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px 18px 16px;
  transition:border-color .18s,transform .18s,box-shadow .18s;
  position:relative;cursor:pointer;
  display:flex;flex-direction:column;gap:0;
  min-height:168px;
}
.prompt-card:hover{
  border-color:rgba(233,69,96,0.35);
  transform:scale(1.012);
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(233,69,96,0.25);
}
.prompt-card.expanded{
  cursor:default;border-color:rgba(233,69,96,0.35);
}
/* Status dot */
.status-dot{
  position:absolute;top:12px;right:44px;
  width:7px;height:7px;border-radius:9999px;
  background:#4ade80;
}
/* Card row 1: icon + title + star */
.card-row1{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-icon-box{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.04);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.card-title{
  font-size:14px;font-weight:700;
  color:var(--txt);
  font-family:var(--font-body);line-height:1.35;
  flex:1;padding-top:5px;
  overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.card-star{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:6px;cursor:pointer;
  background:transparent;flex-shrink:0;margin-top:2px;
  color:rgba(255,255,255,0.25);
  transition:color .12s,background .12s;
}
.card-star:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6)}
.card-star.active{color:#fbbf24}
/* Card description */
.card-desc{
  font-size:12px;color:rgba(255,255,255,0.45);
  font-family:var(--font-body);line-height:1.6;
  overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  margin-bottom:auto;padding-bottom:10px;
}
/* Card footer */
.card-footer{
  display:flex;align-items:center;gap:6px;
  padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);
  flex-wrap:wrap;
}
.card-tag{
  font-size:10px;color:var(--txt-mute);
  font-family:var(--font-mono);
}
.card-svc-pill{
  font-size:10px;padding:2px 7px;border-radius:9px;
  background:rgba(233,69,96,0.1);color:rgba(233,69,96,0.7);
  border:1px solid rgba(233,69,96,0.2);
  font-family:var(--font-mono);
}
.card-tier-pill{
  font-size:10px;padding:2px 7px;border-radius:9px;
  background:rgba(255,255,255,0.05);color:var(--txt-mute);
  border:1px solid rgba(255,255,255,0.07);
  font-family:var(--font-mono);
}
.card-copy{
  margin-left:auto;
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:6px;
  font-size:11px;font-weight:500;cursor:pointer;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--txt-dim);
  font-family:var(--font-body);
  transition:background .12s,color .12s;
}
.card-copy:hover{background:rgba(233,69,96,0.15);color:var(--red);border-color:var(--red-border)}
.card-copy.done{background:rgba(74,222,128,0.12);color:#4ade80;border-color:rgba(74,222,128,0.3)}

/* Expanded body */
.card-body-full{
  display:none;
  margin-top:14px;padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.06);
  animation:cardExpandIn .16s ease-out;
}
.prompt-card.expanded .card-body-full{display:block}
.prompt-card.expanded .card-desc{display:none}
.card-body-text{
  font-size:12px;color:rgba(255,255,255,0.65);
  font-family:var(--font-mono);line-height:1.7;
  white-space:pre-wrap;word-break:break-word;
  max-height:320px;overflow-y:auto;
  padding-right:4px;
}
.card-body-text::-webkit-scrollbar{width:3px}
.card-body-text::-webkit-scrollbar-track{background:transparent}
.card-body-text::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.card-collapse{
  display:none;margin-top:10px;
  padding:5px 12px;border-radius:6px;
  font-size:11px;cursor:pointer;
  background:transparent;border:1px solid rgba(255,255,255,0.1);
  color:var(--txt-dim);font-family:var(--font-body);
  transition:all .14s;
}
.prompt-card.expanded .card-collapse{display:inline-flex}

/* Empty state */
.empty-state{
  padding:48px;text-align:center;font-size:13px;color:var(--txt-mute);
  border:1px dashed rgba(255,255,255,0.07);border-radius:10px;
}

/* Search highlight */
mark{background:rgba(233,69,96,0.25);color:#ff8fa3;border-radius:2px;padding:0 1px}

@keyframes cardExpandIn{
  from{opacity:0;transform:translateY(-4px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── Scrollbar ───────────────────────────────────────────────────────────── */
#sidebar::-webkit-scrollbar,#content::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-track,#content::-webkit-scrollbar-track{background:transparent}
#sidebar::-webkit-scrollbar-thumb,#content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* ─── Responsive ──────────────────────────────────────────────────────────── */
@media(max-width:768px){
  #sidebar{display:none}
  .prompt-card-grid{grid-template-columns:1fr}
  .controls-row{flex-wrap:wrap}
}
@media(max-width:480px){
  #dash-header{padding:16px 16px 12px}
  #content{padding:16px 16px 32px}
}

/* ─── Nav back link ───────────────────────────────────────────────────────── */
#back-nav{
  position:fixed;top:16px;right:20px;z-index:100;
}
#back-nav a{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:500;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--txt-dim);
  font-family:var(--font-body);
  transition:background .14s,color .14s;
}
#back-nav a:hover{background:rgba(255,255,255,0.12);color:var(--txt)}
</style>
</head>
<body>

<nav id="back-nav">
  <a href="index.html">← Intro</a>
</nav>

<div id="root">
  <!-- Left Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-cat-header">Categories</div>
    <div id="sidebar-list"></div>
  </aside>

  <!-- Main Content -->
  <div id="main">
    <!-- Dashboard Header -->
    <header id="dash-header">
      <div class="logo-wrap">
        <svg id="paste-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" aria-label="Paste">
          <path d="M9,27 L9,84 Q9,91 16,91 L64,91 Q71,91 71,84 L71,37 L57,22 L16,22 Q9,22 9,27 Z" fill="none" stroke="#1B2235" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round"/>
          <path d="M57,22 L57,37 L71,37" fill="none" stroke="#1B2235" stroke-width="4.5" stroke-linejoin="round"/>
          <path d="M34,21 Q34,10 41,10 Q48,10 48,21" fill="none" stroke="#1B2235" stroke-width="4.5" stroke-linecap="round"/>
          <rect x="29" y="17" width="24" height="14" rx="3.5" fill="#1B2235"/>
          <rect x="15" y="44" width="28" height="5.5" rx="2.75" fill="#ABABAB"/>
          <rect x="15" y="54.5" width="23" height="5.5" rx="2.75" fill="#ABABAB"/>
          <rect x="15" y="65" width="17" height="5.5" rx="2.75" fill="#ABABAB"/>
          <circle cx="64" cy="66" r="27" fill="#F9A825"/>
          <path d="M58,77 Q54,70 57,64 Q60,59 64,58 Q68,59 71,64 Q74,70 70,77" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M60,77 Q62,80 64,77 Q66,80 68,77" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
          <rect x="57" y="87" width="14" height="5" rx="2.5" fill="#1B2235"/>
          <rect x="60.5" y="93.5" width="7" height="4.5" rx="2.25" fill="#1B2235"/>
        </svg>
      </div>
      <div class="title-row">
        <h1>Paste</h1>
        <span id="total-count">— prompts</span>
      </div>
      <div class="controls-row">
        <div class="model-toggle">
          <button class="model-btn active" data-model="high" title="High — full output mode">high</button>
          <button class="model-btn" data-model="low" title="Low — raw prompt, fast">low</button>
        </div>
        <select id="sort-select">
          <option value="default">Default order</option>
          <option value="alpha">Alphabetical</option>
        </select>
        <button id="new-btn" title="Coming soon">+ New</button>
      </div>
      <div class="search-section">
        <div class="search-wrap">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="Search prompts, workflows, or categories…" autocomplete="off" spellcheck="false"/>
          <button id="search-clear" aria-label="Clear search">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="service-filters">
          <button class="svc-btn active" data-svc="all">All</button>
          <button class="svc-btn" data-svc="claude">Claude</button>
          <button class="svc-btn" data-svc="codex">Codex</button>
          <button class="svc-btn" data-svc="gemini">Gemini</button>
        </div>
      </div>
    </header>

    <!-- Content Grid Area -->
    <div id="content">
      <div id="search-results-label"></div>
      <div id="cat-header">
        <span class="cat-icon"></span>
        <span class="cat-label"></span>
        <span class="cat-count"></span>
        <div class="spacer"></div>
        <button id="expand-all-btn">Expand all</button>
      </div>
      <div class="tier-tabs" id="tier-tabs">
        <button class="tier-btn active" data-tier="full">Full Prompts</button>
        <button class="tier-btn" data-tier="quick">Quick</button>
        <button class="tier-btn" data-tier="combo">Combo</button>
        <button class="tier-btn" data-tier="paragraph">Paragraph</button>
      </div>
      <div id="card-grid" class="prompt-card-grid"></div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

// ─── Category meta ──────────────────────────────────────────────────────────
const CATEGORY_META = {
  'Build':           { icon: '⚡', label: 'Build' },
  'Ship':            { icon: '🚀', label: 'Ship' },
  'Run & Secure':    { icon: '🔒', label: 'Run & Secure' },
  'Know & Grow':     { icon: '📚', label: 'Know & Grow' },
  'Connect & People':{ icon: '🤝', label: 'Connect & People' },
  'Universal':       { icon: '🌐', label: 'Universal' },
};

// Category display order
const CATEGORY_ORDER = ['Build','Ship','Run & Secure','Know & Grow','Connect & People','Universal'];

// High model preamble
const HIGH_PREAMBLE = `You are a highly capable AI assistant. Approach this task with deep, structured reasoning and comprehensive output. Write your response in full paragraphs or numbered sections. Do not truncate or summarize — produce complete, thorough results.\n\nInstructions:\n`;
const HIGH_SUFFIX = `\n\nRequirements:\n1. Think step-by-step before responding\n2. Structure output using full paragraphs or numbered sections\n3. Provide concrete examples and code samples where applicable\n4. If multiple valid approaches exist, enumerate and evaluate each\n5. Be exhaustive — depth and completeness are prioritized over brevity\n\nOutput format: full paragraphs or numbered sections. Ensure the response is production-ready and immediately actionable.`;

// ─── State ──────────────────────────────────────────────────────────────────
let allPrompts = [];
let groupedByDomain = {};
let activeDomain = 'Build';
let activeTier = 'full'; // full | quick | combo | paragraph
let activeService = 'all';
let searchQuery = '';
let modelMode = 'high'; // high | low
let sortOrder = 'default';
let expandAll = false;
let favorites = new Set();
let expandedCards = new Set();

// ─── LocalStorage ───────────────────────────────────────────────────────────
function loadFavorites() {
  try {
    const raw = localStorage.getItem('paste.favorites');
    if (raw) favorites = new Set(JSON.parse(raw));
  } catch {}
}
function saveFavorites() {
  try { localStorage.setItem('paste.favorites', JSON.stringify([...favorites])); } catch {}
}

// ─── Derive title from prompt text ──────────────────────────────────────────
function deriveTitle(text, section) {
  // Take first line, up to first period/colon, max 58 chars
  const firstLine = text.split('\n')[0].trim();
  // Clean common instruction prefixes to get the action
  const clean = firstLine
    .replace(/^(You are |Act as |Perform a |Perform |Review |Write |Generate |Create |Identify |Given |Read |For each |Step 1:|Step 2:)/i, '')
    .trim();
  if (!clean) return section;
  if (clean.length <= 58) return clean;
  const cut = clean.lastIndexOf(' ', 55);
  return clean.slice(0, cut > 10 ? cut : 55) + '…';
}

// ─── Highlight search term ───────────────────────────────────────────────────
function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0, idx)) +
    '<mark>' + escapeHtml(text.slice(idx, idx + query.length)) + '</mark>' +
    escapeHtml(text.slice(idx + query.length));
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Copy to clipboard ───────────────────────────────────────────────────────
function copyText(text) {
  const finalText = modelMode === 'high'
    ? HIGH_PREAMBLE + text + HIGH_SUFFIX
    : text;
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(finalText).catch(() => fallbackCopy(finalText));
  } else {
    fallbackCopy(finalText);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch {}
  document.body.removeChild(ta);
}

// ─── Get filtered prompts for current view ──────────────────────────────────
function getFilteredPrompts() {
  const domain = groupedByDomain[activeDomain] || [];
  let filtered = domain.filter(p => {
    if (activeService !== 'all' && p.service !== activeService) return false;
    if (activeTier !== 'full' && p.tier !== activeTier) return false;
    return true;
  });
  if (sortOrder === 'alpha') {
    filtered = [...filtered].sort((a, b) => a._title.localeCompare(b._title));
  }
  return filtered;
}

// ─── Search across all prompts ───────────────────────────────────────────────
function searchPrompts(q) {
  const lq = q.toLowerCase();
  return allPrompts.filter(p => {
    if (activeService !== 'all' && p.service !== activeService) return false;
    return (
      p._title.toLowerCase().includes(lq) ||
      p.prompt.toLowerCase().includes(lq) ||
      p.section.toLowerCase().includes(lq) ||
      p.domain.toLowerCase().includes(lq) ||
      (p.tags || []).some(t => t.toLowerCase().includes(lq))
    );
  });
}

// ─── Count per domain (considering active service filter) ───────────────────
function getDomainCounts() {
  const counts = {};
  for (const [domain, prompts] of Object.entries(groupedByDomain)) {
    if (activeService === 'all') {
      counts[domain] = prompts.length;
    } else {
      counts[domain] = prompts.filter(p => p.service === activeService).length;
    }
  }
  return counts;
}

// ─── Render sidebar ──────────────────────────────────────────────────────────
function renderSidebar() {
  const counts = getDomainCounts();
  const container = document.getElementById('sidebar-list');
  container.innerHTML = CATEGORY_ORDER
    .filter(d => groupedByDomain[d])
    .map(domain => {
      const meta = CATEGORY_META[domain] || { icon: '📁', label: domain };
      const count = counts[domain] || 0;
      const active = domain === activeDomain ? ' active' : '';
      return `<button class="sidebar-btn${active}" data-domain="${escapeHtml(domain)}">
        <div class="sidebar-icon-box">${meta.icon}</div>
        <span class="sidebar-label">${escapeHtml(meta.label)}</span>
        <span class="sidebar-count">${count}</span>
      </button>`;
    }).join('');
  container.querySelectorAll('.sidebar-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeDomain = btn.dataset.domain;
      searchQuery = '';
      document.getElementById('search').value = '';
      document.getElementById('search-clear').style.display = 'none';
      expandedCards.clear();
      expandAll = false;
      renderSidebar();
      renderContent();
    });
  });
}

// ─── Render total count ──────────────────────────────────────────────────────
function renderTotalCount() {
  document.getElementById('total-count').textContent = allPrompts.length + ' prompts';
}

// ─── Render category header ──────────────────────────────────────────────────
function renderCatHeader(count) {
  const meta = CATEGORY_META[activeDomain] || { icon: '📁', label: activeDomain };
  document.querySelector('#cat-header .cat-icon').textContent = meta.icon;
  document.querySelector('#cat-header .cat-label').textContent = meta.label;
  document.querySelector('#cat-header .cat-count').textContent =
    count + ' prompt' + (count !== 1 ? 's' : '');
  document.getElementById('expand-all-btn').textContent = expandAll ? 'Collapse all' : 'Expand all';
}

// ─── Render a single card ────────────────────────────────────────────────────
function renderCard(p, query) {
  const isExp = expandAll || expandedCards.has(p.id);
  const isFav = favorites.has(p.id);
  const shortDesc = p.prompt.slice(0, 180).replace(/\n+/g, ' ').trim();
  const titleHtml = query ? highlight(p._title, query) : escapeHtml(p._title);
  const descHtml = query
    ? highlight(shortDesc + (p.prompt.length > 180 ? '…' : ''), query)
    : escapeHtml(shortDesc + (p.prompt.length > 180 ? '…' : ''));

  return `<div class="prompt-card${isExp ? ' expanded' : ''}" data-id="${escapeHtml(p.id)}" role="article">
    <div class="status-dot" title="verified"></div>
    <div class="card-row1">
      <div class="card-icon-box">${CATEGORY_META[p.domain]?.icon || '📁'}</div>
      <div class="card-title">${titleHtml}</div>
      <button class="card-star${isFav ? ' active' : ''}" data-id="${escapeHtml(p.id)}" aria-label="${isFav ? 'Unfavorite' : 'Favorite'}" title="Star">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="${isFav ? '#fbbf24' : 'none'}" stroke="${isFav ? '#fbbf24' : 'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
    </div>
    <div class="card-desc">${descHtml}</div>
    <div class="card-body-full">
      <div class="card-body-text">${escapeHtml(p.prompt)}</div>
      <button class="card-collapse">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px"><polyline points="18 15 12 9 6 15"/></svg>
        Collapse
      </button>
    </div>
    <div class="card-footer">
      <span class="card-tag">${escapeHtml(p.section)} · ${escapeHtml(p.domain.toLowerCase())}</span>
      <span class="card-svc-pill">${escapeHtml(p.service || 'claude')}</span>
      <span class="card-tier-pill">${escapeHtml(p.tier)}</span>
      <button class="card-copy" data-id="${escapeHtml(p.id)}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
    </div>
  </div>`;
}

// ─── Wire card events ────────────────────────────────────────────────────────
function wireCardEvents(grid) {
  // Card expand/collapse
  grid.querySelectorAll('.prompt-card').forEach(card => {
    const id = card.dataset.id;
    // Click to expand
    card.addEventListener('click', e => {
      if (e.target.closest('.card-star') || e.target.closest('.card-copy') || e.target.closest('.card-collapse')) return;
      if (card.classList.contains('expanded')) return;
      expandedCards.add(id);
      card.classList.add('expanded');
      card.style.cursor = 'default';
    });
    // Collapse button
    const collapseBtn = card.querySelector('.card-collapse');
    if (collapseBtn) {
      collapseBtn.addEventListener('click', e => {
        e.stopPropagation();
        expandedCards.delete(id);
        card.classList.remove('expanded');
        card.style.cursor = 'pointer';
      });
    }
    // Star
    const starBtn = card.querySelector('.card-star');
    if (starBtn) {
      starBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (favorites.has(id)) {
          favorites.delete(id);
          starBtn.classList.remove('active');
          starBtn.querySelector('svg').setAttribute('fill','none');
          starBtn.querySelector('svg').setAttribute('stroke','currentColor');
        } else {
          favorites.add(id);
          starBtn.classList.add('active');
          starBtn.querySelector('svg').setAttribute('fill','#fbbf24');
          starBtn.querySelector('svg').setAttribute('stroke','#fbbf24');
        }
        saveFavorites();
      });
    }
    // Copy
    const copyBtn = card.querySelector('.card-copy');
    if (copyBtn) {
      copyBtn.addEventListener('click', e => {
        e.stopPropagation();
        const prompt = allPrompts.find(p => p.id === id);
        if (!prompt) return;
        copyText(prompt.prompt);
        copyBtn.classList.add('done');
        copyBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          copyBtn.classList.remove('done');
          copyBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
        }, 1800);
      });
    }
  });
}

// ─── Render main content area ────────────────────────────────────────────────
function renderContent() {
  const grid = document.getElementById('card-grid');
  const srLabel = document.getElementById('search-results-label');
  const catHeaderEl = document.getElementById('cat-header');
  const tierTabsEl = document.getElementById('tier-tabs');

  if (searchQuery.trim()) {
    // Search mode
    catHeaderEl.style.display = 'none';
    tierTabsEl.style.display = 'none';
    const results = searchPrompts(searchQuery.trim());
    srLabel.style.display = 'block';
    srLabel.textContent = results.length + (results.length === 1 ? ' result' : ' results');
    if (results.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">No prompts match "${escapeHtml(searchQuery)}"</div>`;
    } else {
      grid.innerHTML = results.map(p => renderCard(p, searchQuery.trim())).join('');
      wireCardEvents(grid);
    }
  } else {
    // Category mode
    catHeaderEl.style.display = 'flex';
    tierTabsEl.style.display = 'flex';
    srLabel.style.display = 'none';
    const filtered = getFilteredPrompts();
    renderCatHeader(filtered.length);
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">No prompts in this category for the current filter.</div>`;
    } else {
      grid.innerHTML = filtered.map(p => renderCard(p, '')).join('');
      wireCardEvents(grid);
    }
  }
}

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  loadFavorites();

  // Fetch prompts.json
  let data;
  try {
    const res = await fetch('./prompts.json');
    data = await res.json();
  } catch (err) {
    document.getElementById('card-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1">Could not load prompts.json</div>';
    return;
  }

  // Enrich prompts
  allPrompts = data.map(p => ({
    ...p,
    service: p.service || 'claude',
    _title: deriveTitle(p.prompt, p.section),
  }));

  // Group by domain, preserving order
  groupedByDomain = {};
  for (const domain of CATEGORY_ORDER) {
    const matches = allPrompts.filter(p => p.domain === domain);
    if (matches.length) groupedByDomain[domain] = matches;
  }

  // Render
  renderTotalCount();
  renderSidebar();
  renderContent();

  // ─── Event listeners ──────────────────────────────────────────────────────

  // Search
  const searchEl = document.getElementById('search');
  const clearBtn = document.getElementById('search-clear');
  searchEl.addEventListener('input', e => {
    searchQuery = e.target.value;
    clearBtn.style.display = searchQuery ? 'flex' : 'none';
    expandedCards.clear();
    renderContent();
  });
  clearBtn.addEventListener('click', () => {
    searchQuery = '';
    searchEl.value = '';
    clearBtn.style.display = 'none';
    searchEl.focus();
    expandedCards.clear();
    renderContent();
  });

  // Service filter
  document.querySelectorAll('.svc-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeService = btn.dataset.svc;
      document.querySelectorAll('.svc-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      expandedCards.clear();
      renderSidebar();
      renderContent();
    });
  });

  // Tier tabs
  document.querySelectorAll('.tier-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTier = btn.dataset.tier;
      document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      expandedCards.clear();
      renderContent();
    });
  });

  // Model toggle
  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      modelMode = btn.dataset.model;
      document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Sort
  document.getElementById('sort-select').addEventListener('change', e => {
    sortOrder = e.target.value;
    expandedCards.clear();
    renderContent();
  });

  // Expand all
  document.getElementById('expand-all-btn').addEventListener('click', () => {
    expandAll = !expandAll;
    document.getElementById('expand-all-btn').textContent = expandAll ? 'Collapse all' : 'Expand all';
    if (!expandAll) expandedCards.clear();
    renderContent();
  });

  // New button (placeholder)
  document.getElementById('new-btn').addEventListener('click', () => {
    alert('Custom prompts — coming soon');
  });
}

init();
})();
</script>
</body>
</html>
